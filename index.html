<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registar Garancija Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDAqkl8MzPRjVg9MVxc2lMsbdvRmGi_P2A",
          authDomain: "registar-garancija-74a34.firebaseapp.com",
          projectId: "registar-garancija-74a34",
          storageBucket: "registar-garancija-74a34.firebasestorage.app",
          messagingSenderId: "358578315364",
          appId: "1:358578315364:web:8b462c97f860f1c3a63f71"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        window.firebaseDeps = { auth, db, appId: "registar-garancija-74a34", provider, signInWithPopup, signOut, onAuthStateChanged, collection, onSnapshot, addDoc, deleteDoc, doc };
    </script>

    <script type="text/babel" data-type="module">
        const { useState, useMemo, useEffect, useRef } = React;

        const calcExp = (pd, bm, em = 0) => {
            const d = new Date(pd);
            d.setMonth(d.getMonth() + parseInt(bm) + (parseInt(em) || 0));
            return d;
        };

        const calcDays = (ed) => {
            const n = new Date(); n.setHours(0,0,0,0);
            const e = new Date(ed); e.setHours(0,0,0,0);
            return Math.ceil((e - n) / (1000 * 60 * 60 * 24));
        };

        const getStyle = (d) => {
            if (d < 0) return { l: 'Istekla', c: 'text-red-700', bg: 'bg-red-50', i: 'x-circle' };
            if (d <= 30) return { l: 'Ističe uskoro', c: 'text-amber-700', bg: 'bg-amber-50', i: 'alert-triangle' };
            return { l: 'Važeća', c: 'text-emerald-700', bg: 'bg-emerald-50', i: 'check-circle' };
        };

        const Icon = ({ name, className }) => {
            const r = useRef(null);
            useEffect(() => {
                if (r.current) {
                    r.current.innerHTML = `<i data-lucide="${name}" class="${className || ''}"></i>`;
                    lucide.createIcons({ root: r.current });
                }
            }, [name, className]);
            return <span ref={r} style={{ display: 'contents' }}></span>;
        };

        function App() {
            const [warranties, setWarranties] = useState([]);
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('list');
            const [selected, setSelected] = useState(null);
            const [search, setSearch] = useState('');

            useEffect(() => {
                if (!window.firebaseDeps) return;
                return window.firebaseDeps.onAuthStateChanged(window.firebaseDeps.auth, u => {
                    setUser(u);
                    setLoading(false);
                });
            }, []);

            useEffect(() => {
                if (!user || !window.firebaseDeps) return;
                const { db, appId, collection, onSnapshot } = window.firebaseDeps;
                return onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'warranties'), s => {
                    setWarranties(s.docs.map(d => ({ id: d.id, ...d.data() })));
                });
            }, [user]);

            const login = () => window.firebaseDeps.signInWithPopup(window.firebaseDeps.auth, window.firebaseDeps.provider);
            const logout = () => window.firebaseDeps.signOut(window.firebaseDeps.auth);

            if (loading) return <div className="min-h-screen flex items-center justify-center">Učitavanje...</div>;

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-100">
                    <div className="bg-white p-8 rounded-2xl shadow-xl text-center max-w-sm w-full">
                        <Icon name="shield-check" className="w-12 h-12 text-blue-600 mx-auto mb-4" />
                        <h1 className="text-2xl font-bold mb-6">GarancijePro</h1>
                        <button onClick={login} className="w-full bg-slate-900 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2">
                            <Icon name="log-in" className="w-5 h-5" /> Prijavi se Google-om
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-10">
                    <header className="bg-white border-b p-4 sticky top-0 z-10">
                        <div className="max-w-5xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2" onClick={() => setView('list')}>
                                <div className="bg-blue-600 p-1.5 rounded-lg text-white"><Icon name="shield-check" className="w-5 h-5" /></div>
                                <span className="font-bold text-xl">GarancijePro</span>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setView('add')} className="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-sm">Dodaj</button>
                                <button onClick={logout} className="p-2 text-slate-400"><Icon name="log-out" className="w-5 h-5" /></button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto p-4">
                        {view === 'list' && (
                            <div className="space-y-4">
                                <input type="text" placeholder="Pretraži..." value={search} onChange={e => setSearch(e.target.value)} className="w-full p-3 border rounded-xl" />
                                <div className="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
                                    {warranties.filter(w => w.name?.toLowerCase().includes(search.toLowerCase())).map(w => {
                                        const exp = calcExp(w.purchaseDate, w.baseMonths, w.extendedMonths);
                                        const st = getStyle(calcDays(exp));
                                        return (
                                            <div key={w.id} onClick={() => { setSelected(w); setView('detail'); }} className="bg-white p-5 rounded-2xl border shadow-sm cursor-pointer">
                                                <div className="flex justify-between mb-2">
                                                    <span className="text-xs font-bold text-slate-400 uppercase">{w.category}</span>
                                                    <span className={`text-[10px] font-bold uppercase px-2 py-1 rounded-full ${st.bg} ${st.c}`}>{st.l}</span>
                                                </div>
                                                <h3 className="font-bold text-lg mb-4 truncate">{w.name}</h3>
                                                <div className="text-xs text-slate-500 border-t pt-3">Ističe: {new Intl.DateTimeFormat('bs').format(exp)}</div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                        {view === 'add' && <AddForm onCancel={() => setView('list')} onSave={() => setView('list')} user={user} />}
                        {view === 'detail' && selected && <Detail item={selected} onBack={() => setView('list')} user={user} />}
                    </main>
                </div>
            );
        }

        function AddForm({ onCancel, onSave, user }) {
            const [form, setForm] = useState({ name: '', category: 'Alati', purchaseDate: new Date().toISOString().split('T')[0], baseMonths: 24, extendedMonths: 0, receiptImage: null });
            const [saving, setSaving] = useState(false);

            const handleFile = (e) => {
                const f = e.target.files[0];
                if (!f) return;
                const r = new FileReader();
                r.onloadend = () => {
                    const img = new Image();
                    img.src = r.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const M = 800; let w = img.width, h = img.height;
                        if (w > h && w > M) { h *= M / w; w = M; } else if (h > M) { w *= M / h; h = M; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        setForm({ ...form, receiptImage: canvas.toDataURL('image/jpeg', 0.6) });
                    };
                };
                r.readAsDataURL(f);
            };

            const submit = async (e) => {
                e.preventDefault(); setSaving(true);
                const { db, appId, collection, addDoc } = window.firebaseDeps;
                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'warranties'), { ...form, createdAt: new Date().toISOString() });
                onSave();
            };

            return (
                <form onSubmit={submit} className="bg-white p-6 rounded-2xl border shadow-sm space-y-4 max-w-xl mx-auto">
                    <h2 className="text-xl font-bold mb-4">Nova garancija</h2>
                    <input type="text" required placeholder="Naziv proizvoda" value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} className="w-full p-3 border rounded-xl" />
                    <div className="grid grid-cols-2 gap-4">
                        <input type="date" value={form.purchaseDate} onChange={e => setForm({ ...form, purchaseDate: e.target.value })} className="p-3 border rounded-xl" />
                        <select value={form.baseMonths} onChange={e => setForm({ ...form, baseMonths: e.target.value })} className="p-3 border rounded-xl">
                            <option value={12}>12 mj.</option><option value={24}>24 mj.</option><option value={60}>60 mj.</option>
                        </select>
                    </div>
                    <label className="block p-4 border-2 border-dashed rounded-xl text-center cursor-pointer hover:bg-slate-50">
                        <input type="file" accept="image/*" onChange={handleFile} className="hidden" />
                        <Icon name="camera" className="w-6 h-6 mx-auto mb-1 text-slate-400" />
                        <span className="text-sm font-bold text-slate-500 uppercase">{form.receiptImage ? 'Račun dodat' : 'Slikaj račun'}</span>
                    </label>
                    <div className="flex gap-2 pt-4">
                        <button type="button" onClick={onCancel} className="flex-1 py-3 font-bold text-slate-500">Odustani</button>
                        <button type="submit" disabled={saving} className="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">{saving ? 'Spremanje...' : 'Sačuvaj'}</button>
                    </div>
                </form>
            );
        }

        function Detail({ item, onBack, user }) {
            const exp = calcExp(item.purchaseDate, item.baseMonths, item.extendedMonths);
            const del = async () => {
                if (!confirm('Obrisati?')) return;
                const { db, appId, doc, deleteDoc } = window.firebaseDeps;
                await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'warranties', item.id));
                onBack();
            };
            return (
                <div className="bg-white rounded-2xl border shadow-sm overflow-hidden max-w-xl mx-auto">
                    <div className="p-6 border-b flex justify-between items-center">
                        <button onClick={onBack}><Icon name="arrow-left" className="w-6 h-6" /></button>
                        <button onClick={del} className="text-red-500"><Icon name="trash-2" className="w-6 h-6" /></button>
                    </div>
                    <div className="p-6 space-y-6">
                        <div>
                            <span className="text-xs font-bold text-blue-600 uppercase">{item.category}</span>
                            <h2 className="text-2xl font-bold">{item.name}</h2>
                        </div>
                        <div className="grid grid-cols-2 gap-4 bg-slate-50 p-4 rounded-xl">
                            <div><span className="text-[10px] uppercase font-bold text-slate-400">Kupljeno</span><p className="font-bold">{new Intl.DateTimeFormat('bs').format(new Date(item.purchaseDate))}</p></div>
                            <div><span className="text-[10px] uppercase font-bold text-slate-400">Ističe</span><p className="font-bold text-blue-600">{new Intl.DateTimeFormat('bs').format(exp)}</p></div>
                        </div>
                        {item.receiptImage && <img src={item.receiptImage} className="w-full rounded-xl border" />}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
