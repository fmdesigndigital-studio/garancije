<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registar Garancija Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // POPRAVLJENA FIREBASE KONFIGURACIJA
        const firebaseConfig = {
          apiKey: "AIzaSyDAqkl8MzPRjVg9MVxc2lMsbdvRmGi_P2A",
          authDomain: "registar-garancija-74a34.firebaseapp.com",
          projectId: "registar-garancija-74a34",
          storageBucket: "registar-garancija-74a34.firebasestorage.app",
          messagingSenderId: "358578315364",
          appId: "1:358578315364:web:8b462c97f860f1c3a63f71"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "registar-garancija-74a34";

        window.firebaseDeps = { auth, db, appId, signInAnonymously, onAuthStateChanged, collection, onSnapshot, addDoc, deleteDoc, doc };
    </script>

    <script type="text/babel" data-type="module">
        const { useState, useMemo, useEffect, useRef } = React;

        const calculateExpiryDate = (purchaseDate, baseMonths, extendedMonths = 0) => {
            const date = new Date(purchaseDate);
            date.setMonth(date.getMonth() + parseInt(baseMonths) + (parseInt(extendedMonths) || 0));
            return date;
        };

        const calculateDaysRemaining = (expiryDate) => {
            const now = new Date();
            now.setHours(0, 0, 0, 0); 
            const exp = new Date(expiryDate);
            exp.setHours(0, 0, 0, 0);
            const diffTime = exp - now;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        };

        const getStatusStyle = (daysRemaining) => {
            if (daysRemaining < 0) return { label: 'Istekla', color: 'text-red-700', bg: 'bg-red-50', border: 'border-red-200', icon: 'x-circle' };
            if (daysRemaining <= 30) return { label: 'Ističe uskoro', color: 'text-amber-700', bg: 'bg-amber-50', border: 'border-amber-200', icon: 'alert-triangle' };
            return { label: 'Važeća', color: 'text-emerald-700', bg: 'bg-emerald-50', border: 'border-emerald-200', icon: 'check-circle' };
        };

        const formatDate = (date) => {
            return new Intl.DateTimeFormat('bs-BA', { day: '2-digit', month: '2-digit', year: 'numeric' }).format(date);
        };

        const Icon = ({ name, className }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}" class="${className || ''}"></i>`;
                    lucide.createIcons({ root: iconRef.current });
                }
            }, [name, className]);
            return <span ref={iconRef} style={{ display: 'contents' }}></span>;
        };

        function App() {
            const [warranties, setWarranties] = useState([]);
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [view, setView] = useState('list');
            const [selectedItem, setSelectedItem] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [filterCategory, setFilterCategory] = useState('Sve');
            const [showCleanupModal, setShowCleanupModal] = useState(false);

            const categories = ['Sve', 'Alati', 'Bela tehnika', 'Mobilni uređaji', 'PC i komponente', 'TV i IT', 'Auto', 'Ostalo'];

            useEffect(() => {
                const initAuth = async () => {
                    if (!window.firebaseDeps) return;
                    const { auth, signInAnonymously, onAuthStateChanged } = window.firebaseDeps;
                    try {
                        await signInAnonymously(auth);
                    } catch (err) {
                        console.error("Greška pri prijavi:", err);
                        setError("Nije moguće povezati se sa bazom. Radite u offline režimu.");
                        setLoading(false);
                    }

                    const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                        setUser(currentUser);
                        if (!currentUser) setLoading(false);
                    });

                    return () => unsubscribe();
                };

                const timer = setTimeout(() => {
                    if (window.firebaseDeps) initAuth();
                }, 500);
                return () => clearTimeout(timer);
            }, []);

            useEffect(() => {
                if (!user || !window.firebaseDeps) return;

                const { db, appId, collection, onSnapshot } = window.firebaseDeps;
                const warrantiesRef = collection(db, 'artifacts', appId, 'users', user.uid, 'warranties');

                setLoading(true);
                const unsubscribe = onSnapshot(warrantiesRef, 
                    (snapshot) => {
                        const data = snapshot.docs.map(doc => ({
                            id: doc.id,
                            ...doc.data()
                        }));
                        setWarranties(data);
                        setLoading(false);
                    },
                    (err) => {
                        console.error("Greška pri čitanju podataka:", err);
                        setError("Provjerite da li ste u Firebase konzoli kreirali Firestore bazu i postavili pravila na 'Start in test mode'.");
                        setLoading(false);
                    }
                );

                return () => unsubscribe();
            }, [user]);

            const handleAddWarranty = async (newWarranty) => {
                if (!user) return;
                const { db, appId, collection, addDoc } = window.firebaseDeps;
                try {
                    const warrantiesRef = collection(db, 'artifacts', appId, 'users', user.uid, 'warranties');
                    await addDoc(warrantiesRef, {
                        ...newWarranty,
                        createdAt: new Date().toISOString()
                    });
                    setView('list');
                } catch (err) {
                    console.error("Greška pri dodavanju:", err);
                    alert("Došlo je do greške prilikom čuvanja garancije.");
                }
            };

            const handleDelete = async (id) => {
                if (!user || !window.confirm('Sigurno brišete ovu garanciju? Trajno će biti uklonjena.')) return;
                const { db, appId, doc, deleteDoc } = window.firebaseDeps;
                try {
                    const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'warranties', id);
                    await deleteDoc(docRef);
                    setView('list');
                    setSelectedItem(null);
                } catch (err) {
                    console.error("Greška pri brisanju:", err);
                    alert("Došlo je do greške prilikom brisanja.");
                }
            };

            const handleBulkCleanup = async (itemsToDeleteIds) => {
                if (!user) return;
                const { db, appId, doc, deleteDoc } = window.firebaseDeps;
                try {
                    for (const id of itemsToDeleteIds) {
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'warranties', id);
                        await deleteDoc(docRef);
                    }
                    setShowCleanupModal(false);
                } catch (err) {
                    console.error("Greška pri grupnom brisanju:", err);
                    alert("Došlo je do greške prilikom čišćenja arhive.");
                }
            };

            const filteredWarranties = useMemo(() => {
                return warranties.filter(item => {
                    const matchesSearch = item.name?.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesCategory = filterCategory === 'Sve' || item.category === filterCategory;
                    return matchesSearch && matchesCategory;
                }).sort((a, b) => {
                    return calculateExpiryDate(a.purchaseDate, a.baseMonths, a.extendedMonths) - calculateExpiryDate(b.purchaseDate, b.baseMonths, b.extendedMonths);
                });
            }, [warranties, searchQuery, filterCategory]);

            if (loading && warranties.length === 0) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-50">
                        <div className="flex flex-col items-center text-slate-500">
                            <Icon name="loader-2" className="w-8 h-8 animate-spin mb-4 text-blue-600" />
                            <p>Povezivanje sa Firebase bazom...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen relative pb-20">
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-20 shadow-sm">
                        <div className="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('list')}>
                                <div className="bg-blue-600 p-2 rounded-lg"><Icon name="shield-check" className="w-5 h-5 text-white" /></div>
                                <h1 className="text-xl font-bold text-slate-800">Garancije<span className="text-blue-600">Pro</span></h1>
                            </div>
                            
                            <div className="flex items-center gap-3">
                                <div className="hidden sm:flex items-center gap-1.5 text-xs font-medium text-emerald-600 bg-emerald-50 px-2 py-1 rounded-full border border-emerald-100">
                                    <div className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
                                    Live Sync
                                </div>

                                {view === 'list' && (
                                    <button onClick={() => setView('add')} className="flex items-center gap-2 bg-slate-900 hover:bg-slate-800 text-white px-4 py-2 rounded-lg font-medium transition-colors text-sm">
                                        <Icon name="plus" className="w-4 h-4" />
                                        <span className="hidden sm:inline">Dodaj</span>
                                    </button>
                                )}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-4 py-6">
                        {error && (
                            <div className="mb-6 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl flex items-start gap-3">
                                <Icon name="alert-circle" className="w-5 h-5 flex-shrink-0 mt-0.5" />
                                <p className="text-sm font-medium">{error}</p>
                            </div>
                        )}

                        {view === 'list' && (
                            <div className="space-y-6">
                                <div className="flex flex-col md:flex-row gap-3">
                                    <div className="relative flex-1">
                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                            <Icon name="search" className="h-5 w-5 text-slate-400" />
                                        </div>
                                        <input 
                                            type="text" 
                                            placeholder="Pretraži alate, uređaje..." 
                                            value={searchQuery}
                                            onChange={(e) => setSearchQuery(e.target.value)}
                                            className="block w-full pl-10 pr-3 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm shadow-sm"
                                        />
                                    </div>
                                    <div className="flex gap-2 w-full md:w-auto">
                                        <select 
                                            value={filterCategory}
                                            onChange={(e) => setFilterCategory(e.target.value)}
                                            className="py-2.5 px-3 bg-white border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 shadow-sm flex-1 md:flex-none"
                                        >
                                            {categories.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                        </select>
                                        <button 
                                            onClick={() => setShowCleanupModal(true)}
                                            className="flex items-center justify-center gap-2 bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 px-4 py-2.5 rounded-xl text-sm font-medium transition-colors shadow-sm"
                                        >
                                            <Icon name="settings-2" className="w-4 h-4" />
                                            <span className="hidden sm:inline">Očisti</span>
                                        </button>
                                    </div>
                                </div>

                                <div className="grid grid-cols-3 gap-3">
                                    <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm text-center">
                                        <span className="text-slate-500 text-xs font-medium uppercase tracking-wider block mb-1">Ukupno</span>
                                        <span className="text-2xl font-bold text-slate-800">{warranties.length}</span>
                                    </div>
                                    <div className="bg-amber-50 p-4 rounded-xl border border-amber-100 shadow-sm text-center">
                                        <span className="text-amber-700 text-xs font-medium uppercase tracking-wider block mb-1">Ističe skoro</span>
                                        <span className="text-2xl font-bold text-amber-700">
                                            {warranties.filter(w => {
                                                const days = calculateDaysRemaining(calculateExpiryDate(w.purchaseDate, w.baseMonths, w.extendedMonths));
                                                return days >= 0 && days <= 30;
                                            }).length}
                                        </span>
                                    </div>
                                    <div className="bg-red-50 p-4 rounded-xl border border-red-100 shadow-sm text-center">
                                        <span className="text-red-700 text-xs font-medium uppercase tracking-wider block mb-1">Istekle</span>
                                        <span className="text-2xl font-bold text-red-700">
                                            {warranties.filter(w => calculateDaysRemaining(calculateExpiryDate(w.purchaseDate, w.baseMonths, w.extendedMonths)) < 0).length}
                                        </span>
                                    </div>
                                </div>

                                {filteredWarranties.length === 0 && !error ? (
                                    <div className="text-center py-16 bg-white rounded-2xl border border-dashed border-slate-300">
                                        <Icon name="database" className="w-12 h-12 text-slate-300 mx-auto mb-3" />
                                        <h3 className="text-lg font-medium text-slate-900">Baza je prazna</h3>
                                        <p className="text-sm text-slate-500 mt-1">Dodajte svoju prvu garanciju da biste započeli.</p>
                                    </div>
                                ) : (
                                    <div className="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
                                        {filteredWarranties.map((item) => {
                                            const expiryDate = calculateExpiryDate(item.purchaseDate, item.baseMonths, item.extendedMonths);
                                            const daysRemaining = calculateDaysRemaining(expiryDate);
                                            const style = getStatusStyle(daysRemaining);

                                            return (
                                                <div 
                                                    key={item.id} 
                                                    onClick={() => { setSelectedItem(item); setView('detail'); }}
                                                    className={`bg-white p-5 rounded-2xl border ${style.border} shadow-sm hover:shadow-md cursor-pointer transition-all flex flex-col h-full`}
                                                >
                                                    <div className="flex justify-between items-start mb-3">
                                                        <span className="text-[10px] font-bold uppercase tracking-wider text-slate-500 bg-slate-100 px-2 py-1 rounded-md">{item.category}</span>
                                                        <div className={`flex items-center gap-1 px-2 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider ${style.bg} ${style.color}`}>
                                                            <Icon name={style.icon} className="w-3 h-3" />
                                                            {style.label}
                                                        </div>
                                                    </div>
                                                    <h3 className="text-base font-bold text-slate-800 leading-tight mb-4 flex-grow">{item.name}</h3>
                                                    <div className="flex items-center justify-between text-sm pt-4 border-t border-slate-100 mt-auto">
                                                        <div className="flex flex-col">
                                                            <span className="text-slate-400 text-[10px] uppercase font-bold">Ističe</span>
                                                            <span className="font-semibold text-slate-700 flex items-center gap-1 text-xs">
                                                                <Icon name="calendar" className="w-3 h-3" />
                                                                {formatDate(expiryDate)}
                                                            </span>
                                                        </div>
                                                        {daysRemaining > 0 && daysRemaining <= 30 && <span className="text-amber-600 font-bold text-xs bg-amber-50 px-2 py-1 rounded-md">Još {daysRemaining} d.</span>}
                                                        {daysRemaining < 0 && <span className="text-red-600 font-bold text-xs bg-red-50 px-2 py-1 rounded-md">Pre {Math.abs(daysRemaining)} d.</span>}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'add' && (
                            <AddWarrantyForm 
                                onSave={handleAddWarranty} 
                                onCancel={() => setView('list')} 
                                categories={categories.filter(c => c !== 'Sve')} 
                            />
                        )}

                        {view === 'detail' && selectedItem && (
                            <WarrantyDetail 
                                item={selectedItem} 
                                onBack={() => setView('list')}
                                onDelete={() => handleDelete(selectedItem.id)}
                            />
                        )}
                    </main>

                    {showCleanupModal && (
                        <CleanupModal 
                            warranties={warranties} 
                            onClose={() => setShowCleanupModal(false)}
                            onConfirm={handleBulkCleanup}
                        />
                    )}
                </div>
            );
        }

        function CleanupModal({ warranties, onClose, onConfirm }) {
            const [retentionDays, setRetentionDays] = useState(30);

            const expiredWarranties = useMemo(() => {
                return warranties.map(item => {
                    const expiryDate = calculateExpiryDate(item.purchaseDate, item.baseMonths, item.extendedMonths);
                    return { ...item, daysRemaining: calculateDaysRemaining(expiryDate) };
                }).filter(item => item.daysRemaining < 0).sort((a, b) => a.daysRemaining - b.daysRemaining);
            }, [warranties]);

            const itemsToDelete = expiredWarranties.filter(item => Math.abs(item.daysRemaining) > retentionDays);

            return (
                <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
                        <div className="p-5 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                            <div className="flex items-center gap-3">
                                <div className="bg-red-100 p-2 rounded-lg"><Icon name="trash-2" className="w-5 h-5 text-red-600" /></div>
                                <h2 className="text-lg font-bold text-slate-800">Čišćenje Baze</h2>
                            </div>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-600"><Icon name="x" className="w-5 h-5" /></button>
                        </div>
                        <div className="p-6 overflow-y-auto flex-1">
                            <p className="text-slate-600 text-sm mb-6">Podesite period čuvanja nakon isteka. Starije garancije će biti obrisane iz baze.</p>
                            
                            <div className="mb-6 bg-slate-50 p-5 rounded-xl border border-slate-200">
                                <div className="flex justify-between items-
